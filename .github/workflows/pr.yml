name: PR

on:
  pull_request:
  workflow_dispatch: # Can run manually from the Actions tab

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: git-lfs-hub/ci-cd/actions/init-bun@main

      - run: bun run test-coverage

      - uses: ./.github/actions/coverage-artifact

  coverage:
    name: Coverage
    needs: test
    uses: ./.github/workflows/coverage.yml
    permissions: { contents: read, pages: write, id-token: write }

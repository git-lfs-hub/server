name: PR

on:
  pull_request:
  workflow_dispatch: # Can run manually from the Actions tab

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: write }

    steps:
      - uses: actions/checkout@v6

      - uses: git-lfs-hub/ci-cd/actions/init@main
        with: { peers: lib@access-token-refactor }

      - run: bun run test-coverage

      - uses: git-lfs-hub/ci-cd/actions/coverage-report@main

  can-merge:
    name: Can merge
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: git-lfs-hub/ci-cd/actions/check-can-merge@main

name: Init server
description: Init bun with lib + config peers, then render wrangler.jsonc + worker types

runs:
  using: composite
  steps:
    - uses: git-lfs-hub/ci-cd/actions/init@main
      with: { peers: lib@lfs-admin config }

    - name: Render vars.json + wrangler.jsonc + types
      shell: bash
      run: |
        bun run config:vars
        bun run config
        bun run types

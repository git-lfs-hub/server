name: Init server
description: Init bun with lib + config peers, then render wrangler.jsonc + worker types

inputs:
  vars-json:
    description: secrets.GLH_VARS_JSON
    required: true

runs:
  using: composite
  steps:
    - uses: git-lfs-hub/ci-cd/actions/init@main
      with: { peers: lib config }

    - name: Render wrangler.jsonc + types
      shell: bash
      run: bun run config
